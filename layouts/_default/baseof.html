<!doctype html>
<html lang="{{ site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ relLangURL "/" }}">{{ site.Title }}</a>
      <nav class="site-nav" aria-label="Main navigation">
        {{ range site.Menus.main }}
          <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
    </div>
  </header>

  <main class="page">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>Public Layer Lab is the public-facing name of Stichting Instituut voor Digitale Publieke Systemen.</p>
      <p>
        <a href="{{ relLangURL "/privacy/" }}">Privacy</a>
        ?
        <a href="{{ relLangURL "/accessibility/" }}">Accessibility</a>
        ?
        <a href="{{ relLangURL "/contact/" }}">Contact</a>
      </p>
    </div>
  </footer>
</body>
</html>
