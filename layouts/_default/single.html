{{ define "main" }}
  <article class="content">
    <p class="kicker">{{ with .Section }}{{ . }}{{ else }}Public Layer Lab{{ end }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Params.status }}<p class="status">{{ . }}</p>{{ end }}
    {{ with .Date }}<p class="meta">{{ .Format "2 January 2006" }}</p>{{ end }}
    {{ .Content }}
  </article>
{{ end }}
